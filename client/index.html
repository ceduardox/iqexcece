    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #080b1f; }
      html.app-loading,
      html.app-loading body {
        background: #080b1f;
        overflow: hidden;
      }
      html.app-loading #root {
        visibility: hidden;
      }
      .initial-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        min-height: 100svh;
        overflow: hidden;
        isolation: isolate;
        background:
          radial-gradient(circle at 50% 42%, rgba(34, 211, 238, 0.18), transparent 28rem),
          linear-gradient(145deg, #080b1f 0%, #111536 48%, #090b1d 100%);
        color: #f8fbff;
        font-family: "Poppins", "Inter", system-ui, sans-serif;
      }
      .initial-loader__content {
        display: grid;
        justify-items: center;
        gap: 18px;
        width: min(84vw, 360px);
        text-align: center;
      }
      .initial-loader__mark {
        position: relative;
        width: 112px;
        height: 112px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.18), rgba(124, 58, 237, 0.08) 58%, transparent 72%);
        filter: drop-shadow(0 0 24px rgba(34, 211, 238, 0.35));
        animation: initial-loader-float 2.4s ease-in-out infinite;
      }
      .initial-loader__mark::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 26px;
        border: 1px solid rgba(34, 211, 238, 0.35);
        box-shadow: inset 0 0 28px rgba(124, 58, 237, 0.2);
        animation: initial-loader-ring 1.8s ease-in-out infinite;
      }
      .initial-loader__logo {
        position: relative;
        z-index: 1;
        width: 78px;
        height: 78px;
        object-fit: contain;
        animation: initial-loader-logo 1.8s ease-in-out infinite;
      }
      .initial-loader__brand {
        margin: 0;
        font-size: clamp(1.35rem, 5vw, 2rem);
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1;
      }
      .initial-loader__brand span {
        color: #22d3ee;
        text-shadow: 0 0 22px rgba(34, 211, 238, 0.45);
      }
      .initial-loader__bar {
        width: min(280px, 76vw);
        height: 5px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }
      .initial-loader__bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #22d3ee, #a78bfa, #f472b6);
        animation: initial-loader-slide 1.05s ease-in-out infinite;
      }
      .initial-loader__text {
        margin: 0;
        color: rgba(248, 251, 255, 0.68);
        font-size: 0.9rem;
        font-weight: 500;
      }
      .initial-loader--hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
      }
      @keyframes initial-loader-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(250%); }
      }
      @keyframes initial-loader-pulse {
        0%, 100% { transform: scale(1); opacity: 0.92; }
        50% { transform: scale(1.04); opacity: 1; }
      }
      @keyframes initial-loader-float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-5px) scale(1.03); }
      }
      @keyframes initial-loader-ring {
        0%, 100% { opacity: 0.55; transform: scale(0.95) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.06) rotate(6deg); }
      }
      @keyframes initial-loader-logo {
        0%, 100% { transform: scale(0.98) rotate(-2deg); filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.25)); }
        50% { transform: scale(1.06) rotate(2deg); filter: drop-shadow(0 0 18px rgba(124, 58, 237, 0.42)); }
      }
      @media (prefers-reduced-motion: reduce) {
        .initial-loader__mark,
        .initial-loader__mark::before,
        .initial-loader__logo,
        .initial-loader__bar::before { animation: none; }
      }
